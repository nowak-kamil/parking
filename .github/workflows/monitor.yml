name: Monitor Parkingów P+R

on:
  repository_dispatch:
    types: [pipedream_trigger]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Warsaw
    permissions:
      contents: write

    steps:
      - name: Pobierz kod repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Zainstaluj zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zainstaluj przeglądarkę Playwright
        run: |
          python -m playwright install chromium --with-deps

      - name: Uruchom skrypt
        run: python scraper.py
   

      - name: Zapisz zmiany (DB i CSV) do repozytorium
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add archiwum_parkingow.db archiwum_parkingow.csv
          git commit -m "Aktualizacja danych parkingowych: $(date)" || echo "Brak zmian do zapisu"
          git push
